
# Server
server.port=8080
app.business-zone=${BUSINESS_ZONE:Europe/Madrid}
app.reports.max-range-days=${REPORTS_MAX_RANGE_DAYS:366}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/apuntalo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Flyway (baseline 4 = Fases 1-4 ya presentes en la BD; migraciones desde 5.1)
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=${FLYWAY_SCHEMA:public}
spring.flyway.default-schema=${FLYWAY_SCHEMA:public}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:4}
spring.flyway.baseline-description=Baseline phases 1-4
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=36000000

# Idempotencia (Fase 4)
# app.idempotency.enforced=false permite migrar el frontend gradualmente:
# las operaciones criticas de tickets funcionan sin Idempotency-Key, pero
# sin ninguna proteccion de duplicados. En produccion debe ser 'true'.
app.idempotency.enforced=true
app.idempotency.max-key-length=100
app.idempotency.retention-hours=48
# Tiempo maximo que un registro puede quedar en PROCESSING antes de
# considerarse abandonado (p.ej. caida del proceso a mitad de peticion).
app.idempotency.processing-timeout-minutes=5
# Limpieza periodica de registros expirados (deshabilitada por defecto:
# el proyecto no requiere @EnableScheduling salvo que se active).
app.idempotency.cleanup-enabled=${IDEMPOTENCY_CLEANUP_ENABLED:false}
app.idempotency.cleanup-delay-ms=3600000

# CORS: patrones de origen permitidos, separados por coma
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:[*],http://127.0.0.1:[*],http://192.168.1.185:[*]}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
