
# Server
server.port=8080

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/apuntalo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=36000000

# Idempotencia (Fase 4)
# app.idempotency.enforced=false permite migrar el frontend gradualmente:
# las operaciones criticas de tickets funcionan sin Idempotency-Key, pero
# sin ninguna proteccion de duplicados. En produccion debe ser 'true'.
app.idempotency.enforced=true
app.idempotency.max-key-length=100
app.idempotency.retention-hours=48

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
